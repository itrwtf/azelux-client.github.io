// ==========================================
// IMPROVED PREPROCESSING
// ==========================================

function cropToTextRegion(canvas) {
    const ctx = canvas.getContext("2d");
    const { width, height } = canvas;
    const data = ctx.getImageData(0, 0, width, height).data;

    let minY = height, maxY = 0, minX = width, maxX = 0;
    const threshold = 80;

    for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
            const i = (y * width + x) * 4;
            const r = data[i], g = data[i+1], b = data[i+2];
            if (r > threshold || g > threshold || b > threshold) {
                if (y < minY) minY = y;
                if (y > maxY) maxY = y;
                if (x < minX) minX = x;
                if (x > maxX) maxX = x;
            }
        }
    }

    if (minY >= maxY || minX >= maxX) return canvas;

    const pad = 20;
    const cx = Math.max(0, minX - pad);
    const cy = Math.max(0, minY - pad);
    const cw = Math.min(width, maxX + pad) - cx;
    const ch = Math.min(height, maxY + pad) - cy;

    const out = document.createElement("canvas");
    out.width = cw;
    out.height = ch;
    out.getContext("2d").drawImage(canvas, cx, cy, cw, ch, 0, 0, cw, ch);
    return out;
}

function makeVariant(sourceCanvas, opts) {
    const { scale = 3, invert = false, threshold = 128, sharpen = false, padding = 30 } = opts;

    const src = sourceCanvas;
    const w = src.width * scale + padding * 2;
    const h = src.height * scale + padding * 2;

    const out = document.createElement("canvas");
    out.width = w;
    out.height = h;
    const ctx = out.getContext("2d");

    ctx.fillStyle = invert ? "#000" : "#fff";
    ctx.fillRect(0, 0, w, h);

    const tmp = document.createElement("canvas");
    tmp.width = src.width * scale;
    tmp.height = src.height * scale;
    tmp.getContext("2d").drawImage(src, 0, 0, tmp.width, tmp.height);

    const imgData = tmp.getContext("2d").getImageData(0, 0, tmp.width, tmp.height);
    const d = imgData.data;

    for (let i = 0; i < d.length; i += 4) {
        const lum = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
        let val = lum > threshold ? 255 : 0;
        if (invert) val = 255 - val;
        d[i] = d[i+1] = d[i+2] = val;
        d[i+3] = 255;
    }

    tmp.getContext("2d").putImageData(imgData, 0, 0);
    ctx.drawImage(tmp, padding, padding);

    return out;
}

// ==========================================
// OCR WITH MULTIPLE STRATEGIES
// ==========================================

function fixOCRText(raw) {
    let t = raw.replace(/\s+/g, "");

    // @ is commonly misread as ® © ° or just dropped — fix all of these
    // Pattern: acx followed by 1/2/3 followed by any non-digit noise before the data
    t = t.replace(/[®©°~]/g, "@");

    // Sometimes tesseract drops the @ entirely: "acx1<digits>" — insert it back
    t = t.replace(/([aA][cC][xX])([123])([^@\d]*)(\d)/g, (m, a, n, junk, d) => `acx${n}@${d}`);

    // Deduplicate doubled markers like "aacx1" → "acx1"
    t = t.replace(/a+cx/gi, "acx");

    // Fix common digit/letter confusions
    t = t
        .replace(/[oO°Ø]/g, "0")
        .replace(/[lL|]/g, "1")
        .replace(/[iI!]/g, "1")
        .replace(/[bB]/g, "8")  // b/B → 8 in digit-only context
        .replace(/[hH]/g, "");  // H not valid in data, strip it

    return t.toLowerCase();
}

function tryExtractACX(raw) {
    let t = raw.replace(/\s+/g, "");

    // @ is misread as ® © ° — normalize all back to @
    t = t.replace(/[®©°~º]/g, "@");

    // fix doubled prefix e.g. "aacx" → "acx"
    t = t.replace(/a+cx/gi, "acx");

    // if acxN has no @, insert it before the first digit run
    t = t.replace(/(acx[123])([^@\d]{0,8})(\d)/gi, (m, marker, junk, d) => marker + "@" + d);

    // lowercase
    t = t.toLowerCase();

    // apply digit-lookalike substitutions everywhere
    t = t
        .replace(/[o°ø]/g, "0")
        .replace(/[l|]/g, "1")
        .replace(/[i!]/g, "1")
        .replace(/[b]/g, "8")
        .replace(/[z]/g, "2")
        .replace(/[s]/g, "5")
        .replace(/[g]/g, "9");

    // now split on the markers and clean each data section to digits-only
    // format: acx1@<digits>acx2@<digits>acx3@<digits>[@<qr>]
    const m1 = t.indexOf("acx1@");
    const m2 = t.indexOf("acx2@");
    const m3 = t.indexOf("acx3@");

    if (m1 !== -1 && m2 !== -1 && m3 !== -1) {
        const d1 = t.slice(m1 + 5, m2).replace(/[^0-9]/g, "");
        const d2 = t.slice(m2 + 5, m3).replace(/[^0-9]/g, "");
        // acx3 data ends at @ (QR separator) or end of string — keep digits only up to @
        const rest3 = t.slice(m3 + 5);
        const atIdx = rest3.indexOf("@");
        const d3 = (atIdx !== -1 ? rest3.slice(0, atIdx) : rest3).replace(/[^0-9]/g, "");
        const result = `acx1@${d1}acx2@${d2}acx3@${d3}`;
        debugLog("Cleaned result: " + result.slice(0, 120));
        return result;
    }

    // fallback: strip everything non-alphanumeric except @
    const clean = t.replace(/[^a-z0-9@]/g, "");
    debugLog("Fallback clean: " + clean.slice(0, 120));
    return clean;
}

async function runOCR(canvas, psm, label) {
    try {
        const result = await Tesseract.recognize(canvas, "eng", {
            tessedit_pageseg_mode: psm,
            tessedit_char_whitelist: "acx@0123456789®©",
            preserve_interword_spaces: "0",
            logger: () => {}
        });
        const raw = result.data.text;
        debugLog(`OCR [${label} PSM${psm}]: ${raw.replace(/\s+/g,'').slice(0,80)}`);
        return raw;
    } catch(e) {
        return "";
    }
}

async function attemptOCR(originalCanvas) {
    const cropped = cropToTextRegion(originalCanvas);

    const variants = [
        { canvas: makeVariant(cropped, { scale: 4, invert: false, threshold: 100 }), psm: 6, label: "light-4x" },
        { canvas: makeVariant(cropped, { scale: 4, invert: false, threshold: 80 }),  psm: 6, label: "light-4x-low" },
        { canvas: makeVariant(cropped, { scale: 3, invert: false, threshold: 120 }), psm: 6, label: "light-3x" },
        { canvas: makeVariant(cropped, { scale: 4, invert: true,  threshold: 100 }), psm: 6, label: "dark-4x" },
        { canvas: makeVariant(cropped, { scale: 4, invert: false, threshold: 100 }), psm: 7, label: "light-4x-psm7" },
        { canvas: makeVariant(cropped, { scale: 3, invert: false, threshold: 80 }),  psm: 13, label: "light-3x-psm13" },
        { canvas: makeVariant(cropped, { scale: 5, invert: false, threshold: 100 }), psm: 6, label: "light-5x" },
    ];

    const results = [];

    for (let i = 0; i < variants.length; i++) {
        const v = variants[i];
        updateProgress(20 + (i / variants.length) * 55, `Trying recognition method ${i+1}/${variants.length}...`);
        const raw = await runOCR(v.canvas, v.psm, v.label);
        if (raw.trim()) results.push(raw);
    }

    return results;
}

function scoreResult(text) {
    const t = text.replace(/\s+/g,'').toLowerCase();
    let score = 0;
    if (t.includes("acx1")) score += 10;
    if (t.includes("acx2")) score += 10;
    if (t.includes("acx3")) score += 10;
    if (t.includes("@")) score += 5;
    const digits = (t.match(/\d/g) || []).length;
    score += Math.min(digits, 30);
    return score;
}

function pickBestResult(results) {
    if (!results.length) return "";
    return results.sort((a, b) => scoreResult(b) - scoreResult(a))[0];
}

function mergeResults(results) {
    const normalized = results.map(r => tryExtractACX(r));
    const best = normalized.sort((a, b) => scoreResult(b) - scoreResult(a))[0];
    debugLog("Best normalized (score " + scoreResult(best) + "): " + best.slice(0, 120));
    return best;
}

// ==========================================
// QR CODE DECODE
// ==========================================

async function decodeQR(canvas) {
    const variants = [
        canvas,
        makeVariant(cropToTextRegion(canvas), { scale: 2, invert: false, threshold: 128 }),
        makeVariant(cropToTextRegion(canvas), { scale: 3, invert: true, threshold: 128 }),
    ];

    for (const c of variants) {
        const ctx = c.getContext("2d");
        const id = ctx.getImageData(0, 0, c.width, c.height);
        const qr = jsQR(id.data, c.width, c.height);
        if (qr) return qr.data;
    }
    return null;
}

// ==========================================
// DECODERS

function take(str, n) { return [parseInt(str.slice(0, n), 10), str.slice(n)]; }
function takeBool(str) { return [str[0] === "1", str.slice(1)]; }

function extractLines(text) {
    const i1 = text.indexOf("acx1@");
    const i2 = text.indexOf("acx2@");
    const i3 = text.indexOf("acx3@");

    debugLog(`Markers at: acx1=${i1} acx2=${i2} acx3=${i3}`);

    if (i1 === -1 || i2 === -1 || i3 === -1) throw new Error("Missing acx markers in: " + text.slice(0, 150));
    if (!(i1 < i2 && i2 < i3)) throw new Error("ACX order invalid");

    return {
        acx1: text.slice(i1, i2),
        acx2: text.slice(i2, i3),
        acx3: text.slice(i3),
    };
}

imageInput.addEventListener("change", async () => {
    if (!imageInput.files[0]) return;

    debugBox.innerHTML = "";
    debugLog("Image selected: " + imageInput.files[0].name);
    downloadBtn.style.display = "none";

    if (generatedBlobUrl) { URL.revokeObjectURL(generatedBlobUrl); generatedBlobUrl = null; }

    updateProgress(5, "Loading image...");

    try {
        const originalCanvas = await imageToCanvas(imageInput.files[0]);
        debugLog(`Canvas: ${originalCanvas.width}x${originalCanvas.height}`);

        updateProgress(10, "Running QR decode...");
        const qrUsername = await decodeQR(originalCanvas);
        debugLog("QR result: " + (qrUsername || "not found"));

        updateProgress(15, "Starting OCR pipeline...");
        const ocrResults = await attemptOCR(originalCanvas);
        debugLog(`Got ${ocrResults.length} OCR results`);

        updateProgress(78, "Merging and fixing OCR output...");
        const merged = mergeResults(ocrResults);

        updateProgress(82, "Extracting config lines...");
        const lines = extractLines(merged);

        updateProgress(88, "Decoding config data...");
        decoded = {
            acx1: decodeACX1(lines.acx1),
            acx2: decodeACX2(lines.acx2),
            acx3: decodeACX3(lines.acx3, qrUsername),
        };

        debugLog("Decoded username: " + decoded.acx3.username);

        updateProgress(92, "Building config file...");
        await prepareConfigZip(decoded.acx3.username);

    } catch (err) {
        debugError("Pipeline failed: " + err.message, err);
        updateProgress(100, "Failed to read config. Make sure the full screen is visible and try again.", true);
        alert("Failed to process screenshot. Make sure all 3 lines (acx1, acx2, acx3) are fully visible and restart your game before retrying.");
        decoded = null;
    }
});

async function addCapeToZip(zip, capeNumber) {
    const capeFolder = `assets/capes/${capeNumber}/`;
    for (let i = 0; i <= 50; i++) {
        const padded = String(i).padStart(3, "0");
        const framePath = `${capeFolder}azelux/assets/cosmetics/capes/animated/frame_${padded}.png`;
        try {
            const response = await fetch(framePath);
            if (!response.ok) throw new Error(`${framePath} not found`);
            zip.file(`azelux/assets/cosmetics/capes/animated/frame_${padded}.png`, await response.blob());
        } catch (err) { console.warn(err.message); }
    }
    const jsonPath = `${capeFolder}render_controllers/azelux.cape.json`;
    try {
        const response = await fetch(jsonPath);
        if (!response.ok) throw new Error(`${jsonPath} not found`);
        zip.file("render_controllers/azelux.cape.json", await response.blob());
    } catch (err) { console.warn(err.message); }
}

async function saveUsername(username) {
    if (!username || username === "Unknown") return;
    const ref = doc(db, "usernames", username.toLowerCase());
    const snap = await getDoc(ref);
    if (!snap.exists()) {
        await setDoc(ref, { username, createdAt: Date.now() });
    }
}

function formatDateTime() {

async function generateNametagImage(username) {
    const canvas = document.createElement("canvas");
    canvas.width = 2000;
    canvas.height = 133;
    const ctx = canvas.getContext("2d");
    const fontSize = 115;
    ctx.font = `${fontSize}px Minecraft`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    const textWidth = ctx.measureText(username).width;
    const padding = 14;
    ctx.fillStyle = "rgba(0, 0, 0, 0.32)";
    ctx.fillRect(canvas.width / 2 - textWidth / 2 - padding, canvas.height / 2 - 63.5, textWidth + padding * 2, 127);
    ctx.fillStyle = "#B5B5B5";
    ctx.fillText(username, canvas.width / 2 + 2, canvas.height / 2 + 1);
    return new Promise(res => canvas.toBlob(res, "image/png"));
}

async function mergeZipContents(targetZip, zipUrl, stripRoot = true) {
    const res = await fetch(zipUrl);
    if (!res.ok) throw new Error(`${zipUrl} not found`);
    const sourceZip = await JSZip.loadAsync(await res.blob());
    for (const entry of Object.values(sourceZip.files)) {
        if (entry.dir) continue;
        const content = await entry.async("blob");
        const path = stripRoot ? entry.name.split("/").slice(1).join("/") : entry.name;
        if (!path) continue;
        targetZip.file(path, content);
    }
}

async function prepareConfigZip(username) {
    if (!decoded) throw new Error("No decoded data");

    const zip = new JSZip();
    await saveUsername(decoded.acx3.username);

    try {
        zip.file("azelux/assets/cosmetics/thirdpersonnametag1.png", await generateNametagImage(decoded.acx3.username));
    } catch (err) { console.warn("Nametag failed:", err); }

    await addCapeToZip(zip, decoded.acx3.cape);

    zip.file("entity/player.entity.json", JSON.stringify(buildPlayerEntityJson(decoded), null, 2));

    zip.file("manifest.json", JSON.stringify({
        format_version: 1,
        header: {
            description: `${username}'s Config\nGenerated ${formatDateTime()}`,
            name: "Azelux Client Config",
            uuid: uuidv4(),
            version: [7, 1, 0]
        },
        modules: [{ description: "V1.0.0", type: "resources", uuid: uuidv4(), version: [7, 1, 0] }]
    }, null, 4));

    const globals = buildGlobalVariables(decoded);
    zip.file("ui/_global_variables.json", JSON.stringify(globals, null, 2));

    if (globals["$cape_physics_toggle_default_state"]) {
        for (const [src, dest] of [["assets/cape_physics/anim.json","animations/azelux.cape.json"], ["assets/cape_physics/geo.json","models/entity/azelux.cape.json"]]) {
            try { const r = await fetch(src); if (r.ok) zip.file(dest, await r.blob()); } catch(e) { console.warn(e); }
        }
    }

    if (globals["$hit_color_main_toggle"]) {
        await addHitColorToZip(zip, globals["$custom_hit_color_default_selected"]);
    }

    if (globals["$left_hand_main_toggle"]) {
        try { await mergeZipContents(zip, "assets/left_hand.zip", false); } catch(e) { console.warn(e); }
    }

    if (globals["$framex_main_toggle"]) {
        if (globals["$disable_particles_toggle_default_state"]) await addParticlesToZip(zip);

        if (globals["$disable_animations_toggle_default_state"]) {
            try { const r = await fetch("assets/no_animations.json"); if (r.ok) zip.file("textures/flipbook_textures.json", await r.blob()); } catch(e) { console.warn(e); }
        }

        if (globals["$low_fire_toggle_default_state"]) {
            for (const f of ["fire_0.png","fire_1.png","soul_fire_0.png","soul_fire_1.png"]) {
                try { const r = await fetch(`assets/fire_assets/${f}`); if (r.ok) zip.file(`textures/blocks/${f}`, await r.blob()); } catch(e) { console.warn(e); }
            }
        }

        if (globals["$clear_water_toggle_default_state"]) {
            try { const r = await fetch("assets/water_assets/biomes_client.json"); if (r.ok) zip.file("biomes_client.json", await r.blob()); } catch(e) { console.warn(e); }
        }

        if (globals["$better_grass_toggle_default_state"]) {
            try { const r = await fetch("assets/grass_assets/terrain_texture.json"); if (r.ok) zip.file("textures/terrain_texture.json", await r.blob()); } catch(e) { console.warn(e); }
            try { const r = await fetch("assets/grass_assets/blocks.json"); if (r.ok) zip.file("blocks.json", await r.blob()); } catch(e) { console.warn(e); }
        }
    }

    if (globals["$glint_colorizer_main_toggle"]) {
        const colorName = GLINT_COLOR_MAP[globals["$custom_glint_color_default_selected"]];
        try { const r = await fetch(`assets/glint_assets/${colorName}_actor_enchant_glint.png`); if (r.ok) zip.file("textures/misc/enchanted_actor_glint.png", await r.blob()); } catch(e) {}
        try { const r = await fetch(`assets/glint_assets/${colorName}_enchant_glint.png`); if (r.ok) zip.file("textures/misc/enchanted_item_glint.png", await r.blob()); } catch(e) {}
    }

    if (globals["$custom_crosshair_default_color_toggle_default_state"]) {
        try { const r = await fetch(`assets/crosshair_assets/crosshair${globals["$custom_crosshair_default_selected"]}.png`); if (r.ok) zip.file("textures/ui/cross_hair.png", await r.blob()); } catch(e) {}
    }

    if (globals["$chunk_border_main_toggle"]) {
        try { const r = await fetch("assets/chunk_borders.json"); if (r.ok) zip.file("animation_controllers/border.animation_controllers.json", await r.blob()); } catch(e) {}
    }

    const iconRes = await fetch("assets/pack_icon.png");
    if (!iconRes.ok) throw new Error("pack_icon.png not found");
    zip.file("pack_icon.png", await iconRes.blob());

    generatedBlobUrl = URL.createObjectURL(await zip.generateAsync({ type: "blob" }));
    generatedFilename = `azelux_config_${username}.mcpack`;

    updateProgress(100, "Ready! Click below to download your config.");
    downloadBtn.style.display = "inline-block";
    downloadBtn.innerText = "DOWNLOAD CONFIG (INSTANT)";
    debugLog("DONE");
}

document.getElementById("downloadZip").addEventListener("click", () => {
    if (!generatedBlobUrl) { alert("File not ready yet."); return; }
    const a = document.createElement("a");
    a.href = generatedBlobUrl;
    a.download = generatedFilename;
    document.body.appendChild(a);
    a.click();
    a.remove();
});
